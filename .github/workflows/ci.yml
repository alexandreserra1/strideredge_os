name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install (Python puro — o motor de visão é crate Rust standalone, não entra aqui)
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      # Os testes Ollama-gated pulam sozinhos (sem LLM no CI). O banco é temporário/hermético
      # (conftest) e os testes de visão usam fakes — não precisa do motor Rust nem de vídeo.
      - name: Testes
        run: pytest -q -k "not e2e"
